name: UI Tests

# The shared plugin CI (kestra-io/actions plugins.yml) only builds/tests the Java plugin, so the
# ui/ micro-frontend is validated here. Runs on every push/PR to the same branches as Main. Tests
# run in jsdom (portable Storybook stories + composable unit tests) — no browser runner required.
on:
  push:
    branches:
      - main
      - master
      - releases/*
  pull_request:
    branches:
      - main
      - master
      - releases/*
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
